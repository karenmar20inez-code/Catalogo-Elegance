<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegance Creations - Catálogo Oficial</title>
    <style>
        /* Estilos para que se vea profesional y ocupe toda la pantalla */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .header { 
            background: #000000; 
            color: #ffffff; 
            padding: 15px; 
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        iframe { 
            width: 100vw; 
            height: calc(100vh - 50px); 
            border: none; 
            display: block; 
        }
    </style>
</head>
<body>
    <div class="header">Elegance Creations - Catálogo de Productos</div>
    
    <!-- El nombre del archivo debe ser exacto: Catalogo-Elegance.pdf -->
    <iframe src="Catalogo-Elegance.pdf"></iframe>

</body>
</html>
